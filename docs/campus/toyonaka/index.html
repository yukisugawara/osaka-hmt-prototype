        <style>
            :root {
                --pastel-pink: #FFD3E4;
                --pastel-peach: #FFE4D1;
                --pastel-lavender: #E3D7FB;
                --pastel-mint: #CFF1E3;
                --pastel-sky: #D6EAFB;
                --pastel-cream: #FFF6DC;
                --ink: #3A3754;
                --ink-soft: #7A7693;
                --accent: #7C5CE6;
                --accent-soft: #B49CFF;
            }

            * { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: "Zen Maru Gothic", "Hiragino Maru Gothic ProN", "Hiragino Sans", system-ui, sans-serif;
                color: var(--ink);
                background: linear-gradient(135deg,
                    var(--pastel-pink) 0%,
                    var(--pastel-peach) 20%,
                    var(--pastel-cream) 40%,
                    var(--pastel-mint) 60%,
                    var(--pastel-sky) 80%,
                    var(--pastel-lavender) 100%);
                background-size: 300% 300%;
                animation: pastelShift 18s ease-in-out infinite;
                overflow: hidden;
                position: relative;
            }

            @keyframes pastelShift {
                0%, 100% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
            }

            /* ふわっと浮かぶ装飾ブロブ */
            .staticrypt-body::before,
            .staticrypt-body::after {
                content: "";
                position: fixed;
                border-radius: 50%;
                filter: blur(60px);
                opacity: 0.7;
                pointer-events: none;
                z-index: 0;
            }
            .staticrypt-body::before {
                width: 420px; height: 420px;
                background: var(--pastel-pink);
                top: -120px; left: -120px;
                animation: floatA 14s ease-in-out infinite;
            }
            .staticrypt-body::after {
                width: 500px; height: 500px;
                background: var(--pastel-lavender);
                bottom: -180px; right: -160px;
                animation: floatB 18s ease-in-out infinite;
            }
            @keyframes floatA {
                0%, 100% { transform: translate(0, 0); }
                50% { transform: translate(40px, 60px); }
            }
            @keyframes floatB {
                0%, 100% { transform: translate(0, 0); }
                50% { transform: translate(-50px, -40px); }
            }

            .staticrypt-content {
                height: 100%;
                margin-bottom: 0;
                position: relative;
                z-index: 1;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 420px;
                margin: 0 auto;
                padding: 24px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: stretch;
                justify-content: center;
                gap: 18px;
                box-sizing: border-box;
            }

            /* スター的なキッカー */
            .staticrypt-kicker {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                font-family: "DM Sans", sans-serif;
                font-size: 0.78rem;
                font-weight: 700;
                letter-spacing: 0.3em;
                text-transform: uppercase;
                color: var(--accent);
            }
            .staticrypt-kicker::before,
            .staticrypt-kicker::after {
                content: "";
                width: 32px; height: 1px;
                background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
            }

            .staticrypt-form {
                position: relative;
                background: rgba(255, 255, 255, 0.55);
                backdrop-filter: blur(24px) saturate(160%);
                -webkit-backdrop-filter: blur(24px) saturate(160%);
                border: 1.5px solid rgba(255, 255, 255, 0.75);
                border-radius: 28px;
                padding: 40px 32px 32px;
                text-align: center;
                box-shadow:
                    0 20px 60px -20px rgba(124, 92, 230, 0.25),
                    0 8px 24px -8px rgba(255, 211, 228, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.8);
            }

            /* 丸いロゴ台座 */
            .staticrypt-logo {
                width: 72px; height: 72px;
                margin: 0 auto 18px;
                border-radius: 22px;
                background: linear-gradient(135deg, #fff 0%, var(--pastel-lavender) 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow:
                    0 8px 20px -6px rgba(124, 92, 230, 0.35),
                    inset 0 -2px 4px rgba(180, 156, 255, 0.2);
            }
            .staticrypt-logo svg {
                width: 42px; height: 42px;
            }

            .staticrypt-instructions { margin: 0 0 22px; }

            .staticrypt-title {
                margin: 0 0 6px;
                font-size: 1.5rem;
                font-weight: 900;
                letter-spacing: 0.02em;
                color: var(--ink);
                line-height: 1.4;
            }

            .staticrypt-instructions p:last-child {
                margin: 0;
                font-size: 0.92rem;
                color: var(--ink-soft);
                line-height: 1.7;
            }

            .staticrypt-hr { display: none; }

            .staticrypt-password-container {
                position: relative;
                margin: 0 0 16px;
                background: rgba(255, 255, 255, 0.8);
                border: 1.5px solid rgba(228, 212, 248, 0.8);
                border-radius: 18px;
                transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--accent-soft);
                background: #fff;
                box-shadow: 0 0 0 4px rgba(180, 156, 255, 0.25);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                width: 100%;
                background: transparent;
                border: 0;
                outline: 0;
                padding: 16px 46px 16px 20px;
                font-size: 1rem;
                font-family: inherit;
                color: var(--ink);
                letter-spacing: 0.04em;
            }
            .staticrypt-form input::placeholder {
                color: #B9B4D4;
                font-weight: 500;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                width: 22px; height: 22px;
                padding: 12px;
                position: absolute;
                right: 4px;
                top: 50%;
                transform: translateY(-50%);
                opacity: 0.5;
                transition: opacity .2s ease;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.9; }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                margin: 0 4px 18px;
                font-size: 0.88rem;
                color: var(--ink-soft);
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                appearance: none;
                -webkit-appearance: none;
                width: 20px; height: 20px;
                border-radius: 7px;
                border: 1.5px solid rgba(180, 156, 255, 0.5);
                background: rgba(255, 255, 255, 0.8);
                cursor: pointer;
                position: relative;
                transition: all .2s ease;
            }
            .staticrypt-remember input[type="checkbox"]:checked {
                background: linear-gradient(135deg, var(--accent-soft), var(--accent));
                border-color: var(--accent);
            }
            .staticrypt-remember input[type="checkbox"]:checked::after {
                content: "";
                position: absolute;
                top: 3px; left: 6px;
                width: 5px; height: 10px;
                border: solid #fff;
                border-width: 0 2.5px 2.5px 0;
                transform: rotate(45deg);
            }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                padding: 16px 18px;
                border: 0;
                border-radius: 18px;
                background: linear-gradient(135deg, #FFB5D1 0%, #B49CFF 50%, #8FCFFF 100%);
                background-size: 200% 200%;
                color: #fff;
                font-family: inherit;
                font-size: 1rem;
                font-weight: 700;
                letter-spacing: 0.12em;
                cursor: pointer;
                text-transform: none;
                transition: transform .15s ease, box-shadow .2s ease, background-position .4s ease;
                box-shadow:
                    0 12px 28px -8px rgba(124, 92, 230, 0.55),
                    inset 0 1px 0 rgba(255, 255, 255, 0.5);
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background-position: 100% 100%;
                transform: translateY(-2px);
                box-shadow:
                    0 16px 34px -8px rgba(124, 92, 230, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.6);
                filter: none;
                outline: 0;
            }
            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translateY(0);
            }

            .staticrypt-footnote {
                text-align: center;
                font-family: "DM Sans", sans-serif;
                font-size: 0.78rem;
                letter-spacing: 0.08em;
                color: var(--ink-soft);
                opacity: 0.85;
            }
            .staticrypt-footnote strong {
                color: var(--ink);
                font-weight: 700;
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2.2rem;
                height: 2.2rem;
                border: 0.22em solid rgba(124, 92, 230, 0.25);
                border-right-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.8s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media (max-width: 480px) {
                .staticrypt-page { padding: 20px 16px; }
                .staticrypt-form { padding: 32px 22px 26px; border-radius: 24px; }
                .staticrypt-title { font-size: 1.3rem; }
            }

            @media (prefers-reduced-motion: reduce) {
                .staticrypt-body,
                .staticrypt-body::before,
                .staticrypt-body::after { animation: none; }
            }
        </style>
    </head>
